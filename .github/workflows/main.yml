name: Generate Trading Signal

on:
  schedule:
    # 北京时间 16:10 (UTC 8:10)
    - cron: '10 8 * * *'
    # 北京时间 22:10 (UTC 14:10)
    - cron: '10 14 * * *'
  workflow_dispatch:
    inputs:
      symbol:
        description: '选择分析的币种'
        required: true
        type: choice
        options:
          - BTC
          - ETH
          - BOTH
        default: 'ETH'

jobs:
  run-strategy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        symbol: ${{ github.event_name == 'schedule' && fromJSON('["BTC", "ETH"]') || (github.event.inputs.symbol == 'BOTH' && fromJSON('["BTC", "ETH"]') || fromJSON(format('["{0}"]', github.event.inputs.symbol))) }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 缓存完整的虚拟环境目录
      - name: Cache virtual environment
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-venv-

      # 如果缓存未命中，创建虚拟环境并安装依赖
      - name: Install dependencies (if cache missed)
        run: |
          if [ ! -d .venv ]; then
            python -m venv .venv
          fi
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt

      - name: Run strategy analysis
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          COINGLASS_API_KEY: ${{ secrets.COINGLASS_API_KEY }}
          DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          STRATEGY_SYMBOL: ${{ matrix.symbol }}
        run: .venv/bin/python main.py
