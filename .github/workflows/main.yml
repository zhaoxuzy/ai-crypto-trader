name: Generate Trading Signal

on:
  schedule:
    - cron: '10 8 * * *'   # 北京时间 16:10
    - cron: '10 14 * * *'  # 北京时间 22:10
  workflow_dispatch:
    inputs:
      symbol:
        description: '选择分析的币种'
        required: true
        type: choice
        options:
          - BTC
          - ETH
          - SOL
          - BOTH
        default: 'ETH'

jobs:
  run-strategy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        symbol: ${{ github.event_name == 'schedule' && fromJSON('["BTC", "ETH"]') || (github.event.inputs.symbol == 'BOTH' && fromJSON('["BTC", "ETH"]') || fromJSON(format('["{0}"]', github.event.inputs.symbol))) }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache virtual environment
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-venv-

      - name: Install dependencies (if cache miss)
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt

      - name: Run strategy analysis
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          COINGLASS_API_KEY: ${{ secrets.COINGLASS_API_KEY }}
          DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          STRATEGY_SYMBOL: ${{ matrix.symbol }}
        run: .venv/bin/python main.py
